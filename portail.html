mount:n(it.a)}}),itemsSubtotal:n(q.is),discount:n(q.disc),subtotal:n(q.sub),gst:n(q.gst),qst:n(q.qst),total:n(q.tot),depositPct:n(q.dp),deposit:n(q.dep),balance:n(q.bal)},portal:{emailjs:{enabled:!!em.on,publicKey:em.pk||'',serviceId:em.sid||'',templateId:em.tid||'',toEmail:em.to||''},supabase:d.s||{}}}}

function b64u(str){return btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}
function hubAcceptUrl(data,name,contact){var q=data.quote||{}; var root=location.href.split('#')[0].split('?')[0].replace(/portail\.html$/,''); var p={qid:q.id||'',no:q.quoteNo||'',by:name||'',ct:contact||'',at:new Date().toISOString()}; return root+'index.html#accept='+b64u(JSON.stringify(p))}

function acceptanceBody(data,name,contact){var q=data.quote||{}, cl=data.client||{}; var at=new Date(); var hub=hubAcceptUrl(data,name,contact); return ['Bonjour,','','J’accepte la soumission suivante :','Soumission : '+(q.quoteNo||''),'Projet : '+(q.title||''),'Total : '+money(q.total),'Acompte : '+(q.depositPct?money(q.deposit)+' ('+q.depositPct+' %)':'non indiqué'),'Solde : '+(q.balance?money(q.balance):''),'','Accepté par : '+name,'Contact : '+contact,'Date/heure : '+at.toLocaleString('fr-CA'),'','Je confirme avoir pris connaissance des conditions, exclusions et modalités de paiement indiquées dans la soumission.','','Lien Hub pour enregistrer l’acceptation :',hub].join('\n')}

      notice.textContent=status==='accepted'?'Merci. Votre acceptation a été transmise.':'Votre refus a été transmis.';
      btn.textContent=status==='accepted'?'Acceptation transmise':'Refus transmis';
    }else{
      notice.textContent='La transmission a échoué. L’entreprise doit vérifier la configuration EmailJS/Supabase.';
      btn.disabled=false; if(other)other.disabled=false; btn.textContent=status==='accepted'?'Accepter la soumission':'Refuser';
    }
  })
}
function accept(data){var name=clean($('#accName').value), contact=clean($('#accContact').value), ok=$('#accCheck').checked; if(!name)return alert('Entrez votre nom complet.'); if(!ok)return alert('Vous devez cocher la case d’acceptation.'); var btn=$('#acceptBtn'), notice=$('#notice'); btn.disabled=true; btn.textContent='Transmission...'; notice.style.display='block'; notice.textContent='Transmission de l’acceptation en cours...'; if(emailjsConfig(data)){sendEmailJS(data,name,contact).then(function(){notice.textContent='Merci. Votre acceptation a été transmise automatiquement.'; btn.textContent='Acceptation transmise'}).catch(function(err){console.warn(err); notice.textContent='L’envoi automatique n’a pas fonctionné. Ouverture du courriel prérempli...'; btn.disabled=false; btn.textContent='Accepter la soumission'; openMailto(data,name,contact)})}else{notice.textContent='Ouverture du courriel prérempli. Appuyez sur Envoyer pour confirmer.'; btn.disabled=false; btn.textContent='Accepter la soumission'; openMailto(data,name,contact)}}
render();
})();
