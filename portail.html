<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Portail client</title><style>body{margin:0;background:#f5f7fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#071225}.wrap{max-width:860px;margin:auto;padding:28px}.card{background:#fff;border:1px solid #dbe3f2;border-radius:28px;padding:28px;margin:16px 0;box-shadow:0 18px 45px rgba(15,23,42,.1)}h1{font-size:42px;letter-spacing:-.04em}.blue{color:#1976ff}.row{display:flex;justify-content:space-between;gap:20px;border-bottom:1px solid #eef2f7;padding:12px 0}.btn{width:100%;border:0;border-radius:18px;padding:18px;font-weight:900;margin:8px 0;font-size:18px}.green{background:#0a9f4a;color:#fff}.red{background:#fee2e2;color:#b91c1c}input{width:100%;border:1px solid #dbe3f2;border-radius:16px;padding:14px;font:inherit;margin:8px 0}.muted{color:#667085}</style></head><body><div id="app" class="wrap"></div><script>
function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}function money(x){return new Intl.NumberFormat('fr-CA',{style:'currency',currency:'CAD'}).format(Number(x||0))}function dec(s){try{s=s||'';s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';return JSON.parse(decodeURIComponent(escape(atob(s))))}catch(e){return null}}var qs=new URLSearchParams(location.search);var data=dec(qs.get('d')||qs.get('q')||(location.hash||'').replace(/^#q=/,''));function render(){if(!data){app.innerHTML='<div class="card"><h1>Lien invalide</h1><p>Le lien de soumission est incomplet ou expiré.</p></div>';return}var q=data.q||{},co=data.co||{},cl=data.cl||{};app.innerHTML='<div class="card"><h1>'+esc(co.n||'Soumission')+'</h1><p class="muted">'+esc(co.c||'')+' · '+esc(co.p||'')+' · '+esc(co.e||'')+'</p><h2 class="blue">'+esc(q.no||'Soumission')+'</h2><p><b>Client :</b> '+esc(cl.n||'')+'<br><b>Projet :</b> '+esc(cl.pt||q.t||'')+'<br><b>Valide jusqu’au :</b> '+esc(q.vu||'')+'</p></div><div class="card"><h2>Détail des travaux</h2>'+(q.it||[]).map(function(it){return'<div class="row"><div><b>'+esc(it[0])+'</b><p class="muted">'+esc(it[1]||'Travaux selon la portée convenue.')+'</p></div><b class="blue">'+money(it[2])+'</b></div>'}).join('')+'</div><div class="card"><h2>Total</h2><div class="row"><span>Sous-total</span><b>'+money(q.sub)+'</b></div><div class="row"><span>TPS</span><b>'+money(q.gst)+'</b></div><div class="row"><span>TVQ</span><b>'+money(q.qst)+'</b></div><h1 class="blue">'+money(q.tot)+'</h1></div><div class="card"><h2>Acceptation</h2><p>Pour l’instant, ce portail confirme votre décision à l’écran. Pour une synchronisation automatique dans le Hub, l’entrepreneur doit connecter Supabase/EmailJS.</p><input id="nm" placeholder="Nom complet"><input id="ct" placeholder="Téléphone ou courriel"><label><input type="checkbox" id="ok"> J’ai lu et j’accepte les conditions.</label><button class="btn green" onclick="decision(\'accepted\')">Accepter la soumission</button><button class="btn red" onclick="decision(\'refused\')">Refuser</button><div id="msg"></div></div><div class="card"><h2>Conditions</h2><p>'+esc(q.terms||'')+'</p><h2>Exclusions</h2><p>'+esc(q.ex||'')+'</p></div>'}function decision(s){if(s==='accepted'&&!document.getElementById('ok').checked){msg.innerHTML='<p style="color:#b91c1c">Cochez la case d’acceptation.</p>';return}msg.innerHTML='<p style="color:#0a9f4a;font-weight:900">Décision enregistrée sur cet appareil : '+(s==='accepted'?'acceptée':'refusée')+'.</p><p class="muted">Une synchronisation automatique nécessite une base externe branchée au Hub.</p>'}render();
</script></body></html>
