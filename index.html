/* ===== v3.2 Entrepreneur OS ===== */

.message-box{background:var(--blue2);border:1px solid rgba(10,99,255,.16);border-radius:18px;padding:12px;color:var(--text);font-size:13px;line-height:1.35;margin:8px 0}
.backup-note{background:var(--orange2);border:1px solid rgba(232,134,25,.22);color:var(--orange);border-radius:18px;padding:11px;font-size:13px;font-weight:850;margin:10px 0}

function quoteSeqFromNo(no,year){var m=String(no||'').match(new RegExp('^.*-'+year+'-(\\d+)$')); return m?Number(m[1]||0):0}
function maxQuoteSeq(year){return state.quotes.reduce(function(m,q){return Math.max(m,quoteSeqFromNo(q.quoteNo,year))},0)}
function peekNextQuoteNo(){var y=String(new Date().getFullYear()); var cur=(state.quoteCounters&&state.quoteCounters[y])||maxQuoteSeq(y)||0; return quotePrefix()+'-'+y+'-'+pad3(cur+1)}
function nextQuoteNo(){var y=String(new Date().getFullYear()); state.quoteCounters=state.quoteCounters||{}; state.quoteCounters[y]=Math.max(state.quoteCounters[y]||0,maxQuoteSeq(y))+1; return quotePrefix()+'-'+y+'-'+pad3(state.quoteCounters[y])}
function ensureQuoteMeta(q){if(!q)return q; q.quoteNo=q.quoteNo||nextQuoteNo(); q.validDays=q.validDays||TARIFS.quote.validDays||15; q.terms=q.terms||TARIFS.quote.terms||''; q.exclusions=q.exclusions||TARIFS.quote.exclusions||''; q.clientIntro=q.clientIntro||''; q.inclusions=q.inclusions||''; return q}
function phone(v){var d=digits(v); if(d.length===10)return '('+d.slice(0,3)+') '+d.slice(3,6)+'-'+d.slice(6); return clean(v)}
function money(x){return new Intl.NumberFormat('fr-CA',{style:'currency',currency:'CAD'}).format(Number(x||0))}
function shortDate(d){if(!d)return 'Date à fixer'; try{return new Date(d+'T12:00:00').toLocaleDateString('fr-CA',{day:'numeric',month:'short'})}catch(e){return d}}
function dateLong(d,t){if(!d)return 'Date à fixer'; var s=shortDate(d); return t?s+' à '+t:s}
function getClient(id){return state.clients.find(function(x){return x.id===id})}
function getVisit(id){return state.visits.find(function(x){return x.id===id})}
function getQuote(id){return state.quotes.find(function(x){return x.id===id})}
function clientName(id){var c=getClient(id); return c?c.name:'Client supprimé'}
function activeClient(){return getClient(state.activeClientId)||state.clients[0]||null}
function activeVisit(){return getVisit(state.activeVisitId)||state.visits[0]||null}
function activeQuote(){return getQuote(state.activeQuoteId)||state.quotes[0]||null}
function statusClass(s){if(['Gagné','Visite faite','Acceptée','En cours'].indexOf(s)>-1)return 'green'; if(['Perdu','Perdue'].indexOf(s)>-1)return 'red'; if(['RDV proposé','RDV confirmé','Visite à faire','Relance 1','Relance 2'].indexOf(s)>-1)return 'orange'; if(['Soumission à préparer','Soumission envoyée','À préparer','Envoyée'].indexOf(s)>-1)return 'purple'; return 'blue'}
function workflowIndex(s){s=s||'Nouveau lead'; if(s==='Perdu')return 6; if(['Gagné','Acceptée','En cours'].indexOf(s)>-1)return 6; if(['Relance 1','Relance 2'].indexOf(s)>-1)return 5; if(['Soumission à préparer','Soumission envoyée','À préparer','Envoyée'].indexOf(s)>-1)return 4; if(['Visite faite'].indexOf(s)>-1)return 3; if(['RDV confirmé','Visite à faire'].indexOf(s)>-1)return 2; if(['Contacté','RDV proposé'].indexOf(s)>-1)return 1; return 0}
function workflowStepsHtml(c){var labels=['Lead','Contact','RDV','Visite','Soum.','Relance','Gagné']; var idx=workflowIndex(c&&c.status); var lost=c&&c.status==='Perdu'; var nodes=labels.map(function(l,i){var cls=lost&&i===6?'lost':(i<idx?'done':(i===idx?'current':'')); var mark=(i<idx&&!lost)?'✓':(i+1); return '<div class="wf-node '+cls+'"><div class="wf-dot">'+esc(lost&&i===6?'×':mark)+'</div><span>'+esc(lost&&i===6?'Perdu':l)+'</span></div>'}).join(''); return '<div class="workflow">'+nodes+'</div>'}

visit" data-client="'+esc(c.id)+'">Planifier chantier</button>'; secondary='<button class="smart-secondary" data-action="open-client" data-id="'+esc(c.id)+'">Dossier</button>'} else {primary='<button class="smart-primary" data-action="open-client" data-id="'+esc(c.id)+'">Ouvrir dossier</button>'; secondary='<button class="smart-secondary" data-action="sms-template" data-kind="followup" data-client="'+esc(c.id)+'">Message</button>'} return '<div class="primary-action">'+primary+secondary+'</div>'}
function nextBestFocus(){var due=dueFollowups(), visits=upcomingVisits(), prep=quotesToPrepare(), cold=coldLeads(); if(due[0]){var c=getClient(due[0].clientId)||{}; return {label:'Priorité',title:'Relancer '+(c.name||'un client'),meta:(due[0].title||'Soumission')+' · '+money(due[0].total||0)+' · '+prettyDue(due[0].nextFollowUp||addDays(due[0].sentAt,2)),action:'show-due',button:'Voir relances'}} if(visits[0]){return {label:'Prochaine visite',title:clientName(visits[0].clientId),meta:(visits[0].projectType||'Projet')+' · '+dateLong(visits[0].date,visits[0].time),action:'show-visits',button:'Préparer'}} if(prep[0]){var cp=getClient(prep[0].clientId)||{}; return {label:'À chiffrer',title:cp.name||'Soumission à préparer',meta:prep[0].title||'Soumission',action:'show-quotes',button:'Chiffrer'}} if(cold[0]){return {label:'Lead froid',title:cold[0].name,meta:daysSince(cold[0].lastContactAt||cold[0].updatedAt||cold[0].createdAt)+' jours sans action',action:'show-cold',button:'Réactiver'}} return {label:'Tout est clair',title:'Aucune urgence aujourd’hui',meta:'Ajoute un lead, prépare une visite ou crée une soumission.',action:'new-client',button:'Nouveau lead'}}

function save(){try{state.lastSavedAt=iso(); localStorage.setItem(KEY,JSON.stringify(state))}catch(e){console.warn(e)}}
function normalizeState(){state.clients=state.clients||[]; state.visits=state.visits||[]; state.photos=state.photos||[]; state.measures=state.measures||[]; state.activities=state.activities||[]; state.quotes=state.quotes||[]; state.quoteCounters=state.quoteCounters||{}; state.activeTab=state.activeTab||'prospects'; state.clientFilter=state.clientFilter||'all'; state.agendaFilter=state.agendaFilter||'all'; state.lastSavedAt=state.lastSavedAt||''; state.lastBackupExportAt=state.lastBackupExportAt||''; state.quotes.forEach(function(q){q.followupStep=q.followupStep||0; q.nextFollowUp=q.nextFollowUp||''; q.sentAt=q.sentAt||''; q.lastSentNote=q.lastSentNote||''; q.discountType=q.discountType||'none'; q.discountValue=q.discountValue||0; q.depositPct=q.depositPct||0; q.paymentTerms=q.paymentTerms||''; q.estimatedDuration=q.estimatedDuration||''; ensureQuoteMeta(q)}); state.clients.forEach(function(c){c.nextFollowUp=c.nextFollowUp||''; c.lastContactAt=c.lastContactAt||''}); state.quotes.forEach(function(q){q.items=q.items||[]; q.taxable=q.taxable!==false; calcQuote(q)})}
function load(){try{var raw=localStorage.getItem(KEY)||localStorage.getItem(OLD_KEY); if(raw){state=Object.assign(state,JSON.parse(raw)); normalizeState(); save()}}catch(e){} if(!state.clients.length)seed(); normalizeState()}

function switchTab(tab){if(!PAGES[tab])return; state.activeTab=tab; $$('.page').forEach(function(p){p.classList.toggle('active',p.id===tab)}); $$('.tab').forEach(function(b){b.classList.toggle('active',b.dataset.tab===tab)}); $('#pageTitle').textContent=PAGES[tab][0]; $('#pageSub').textContent=PAGES[tab][1]; render()}

function dateKey(d){if(!d)return ''; var s=String(d); if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10); var x=new Date(s); return isNaN(x)?'':x.toISOString().slice(0,10)}
function addDays(d,days){var base=d?new Date(dateKey(d)+'T12:00:00'):new Date(); base.setDate(base.getDate()+Number(days||0)); return base.toISOString().slice(0,10)}
function dayDiff(a,b){a=dateKey(a); b=dateKey(b); if(!a||!b)return 0; var A=new Date(a+'T12:00:00'),B=new Date(b+'T12:00:00'); return Math.round((A-B)/86400000)}
function daysSince(d){d=dateKey(d); return d?Math.max(0,dayDiff(today(),d)):0}
function isDue(d){return !!d && dayDiff(d,today())<=0}
function prettyDue(d){if(!d)return 'Aucune date'; var diff=dayDiff(d,today()); if(diff<0)return 'en retard de '+Math.abs(diff)+' j'; if(diff===0)return "aujourd'hui"; if(diff===1)return 'demain'; return 'dans '+diff+' j'}
function quotesToPrepare(){return state.quotes.filter(function(q){return ['Brouillon','À préparer'].indexOf(q.status)>-1}).sort(function(a,b){return (b.updatedAt||b.createdAt).localeCompare(a.updatedAt||a.createdAt)})}
function dueFollowups(){return state.quotes.filter(function(q){return ['Envoyée','Relance 1','Relance 2'].indexOf(q.status)>-1 && (isDue(q.nextFollowUp)||(!q.nextFollowUp&&q.sentAt&&daysSince(q.sentAt)>=2))}).sort(function(a,b){return (a.nextFollowUp||a.sentAt||'').localeCompare(b.nextFollowUp||b.sentAt||'')})}
function upcomingVisits(){var t=today(); return state.visits.filter(function(v){return !v.date || dayDiff(v.date,t)>=0}).sort(function(a,b){return (a.date+a.time).localeCompare(b.date+b.time)}).slice(0,5)}
function hotLeads(){return state.clients.filter(function(c){return ['Nouveau lead','À contacter','Contacté'].indexOf(c.status)>-1}).sort(function(a,b){return (b.updatedAt||b.createdAt).localeCompare(a.updatedAt||a.createdAt)})}
function coldLeads(){return state.clients.filter(function(c){return ['Nouveau lead','À contacter','Contacté'].indexOf(c.status)>-1 && daysSince(c.lastContactAt||c.updatedAt||c.createdAt)>7}).sort(function(a,b){return daysSince(b.lastContactAt||b.updatedAt||b.createdAt)-daysSince(a.lastContactAt||a.updatedAt||a.createdAt)})}
function staleSentQuotes(){return state.quotes.filter(function(q){return ['Envoyée','Relance 1','Relance 2'].indexOf(q.status)>-1 && (isDue(q.nextFollowUp)||daysSince(q.sentAt)>=3)}).sort(function(a,b){return (a.nextFollowUp||a.sentAt||'').localeCompare(b.nextFollowUp||b.sentAt||'')})}
function businessMetrics(){var sent=state.quotes.filter(function(q){return ['Envoyée','Relance 1','Relance 2','Acceptée','Perdue','Archivée'].indexOf(q.status)>-1}).length; var won=state.quotes.filter(function(q){return q.status==='Acceptée'}).length; var lost=state.quotes.filter(function(q){return q.status==='Perdue'}).length; var revenue=state.quotes.filter(function(q){return q.status==='Acceptée'}).reduce(function(s,q){calcQuote(q); return s+n(q.total)},0); return {sent:sent,won:won,lost:lost,rate:sent?Math.round(won/sent*100):0,revenue:revenue}}
