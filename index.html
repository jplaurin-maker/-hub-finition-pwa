/* ===== v3.2 Entrepreneur OS ===== */

.message-box{background:var(--blue2);border:1px solid rgba(10,99,255,.16);border-radius:18px;padding:12px;color:var(--text);font-size:13px;line-height:1.35;margin:8px 0}
.backup-note{background:var(--orange2);border:1px solid rgba(232,134,25,.22);color:var(--orange);border-radius:18px;padding:11px;font-size:13px;font-weight:850;margin:10px 0}

function dateKey(d){if(!d)return ''; var s=String(d); if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10); var x=new Date(s); return isNaN(x)?'':x.toISOString().slice(0,10)}

function dayDiff(a,b){a=dateKey(a); b=dateKey(b); if(!a||!b)return 0; var A=new Date(a+'T12:00:00'),B=new Date(b+'T12:00:00'); return Math.round((A-B)/86400000)}
function daysSince(d){d=dateKey(d); return d?Math.max(0,dayDiff(today(),d)):0}

function dashboardBaseContentV4711(){var due=dueFollowups(), prep=quotesToPrepare(), visits=upcomingVisits(), leads=hotLeads(), cold=coldLeads(); var focus=nextBestFocus(); return backupDashboardAlertHtml()+conversionStatsHtml()+'<div class="focus-card"><div class="focus-top"><div><div class="focus-label">'+esc(focus.label)+'</div><div class="focus-title">'+esc(focus.title)+'</div><div class="focus-meta">'+esc(focus.meta)+'</div></div><button class="focus-btn" data-action="'+esc(focus.action)+'">'+esc(focus.button)+'</button></div></div><div class="section-head"><h2>Aujourd’hui</h2><button data-action="settings">Données</button></div><div class="today-grid">'+taskTile('📞 Relances',due.length,due[0]?((getClient(due[0].clientId)||{}).name+' · '+prettyDue(due[0].nextFollowUp||addDays(due[0].sentAt,2))):'Aucune relance en retard','followups')+taskTile('📅 Visites',visits.length,visits[0]?clientName(visits[0].clientId)+' · '+dateLong(visits[0].date,visits[0].time):'Aucune visite à venir','visits')+taskTile('📋 À chiffrer',prep.length,prep[0]?((getClient(prep[0].clientId)||{}).name+' · '+(prep[0].title||'Soumission')):'Aucune soumission à préparer','quotes')+taskTile('🥶 Leads froids',cold.length,cold[0]?(cold[0].name+' · '+daysSince(cold[0].lastContactAt||cold[0].updatedAt||cold[0].createdAt)+' j sans action'):'Aucun lead froid','cold')+'</div><div class="section-head"><h2>Actions rapides</h2></div><div class="quick-grid"><button class="quick-card" data-action="new-client"><div class="qicon">👤＋</div><strong>Nouveau lead</strong><span>Créer manuellement</span></button><button class="quick-card" data-action="new-visit"><div class="qicon">📅</div><strong>Planifier RDV</strong><span>Visite client</span></button><button class="quick-card" data-action="new-quote"><div class="qicon">📋</div><strong>Nouvelle soumission</strong><span>Attachée au client actif</span></button><button class="quick-card" data-action="crm-import"><div class="qicon">⬇️</div><strong>Importer CRM</strong><span function followupDone(id){var q=getQuote(id); if(!q)return; q.followupStep=Number(q.followupStep||0)+1; if(q.followupStep===1){q.status='Relance 1'; q.nextFollowUp=addDays(today(),3)} else if(q.followupStep===2){q.status='Relance 2'; q.nextFollowUp=addDays(today(),5)} else {q.nextFollowUp=''} q.lastFollowUp=today(); q.updatedAt=iso(); var c=getClient(q.clientId); if(c){c.status=q.status; c.nextFollowUp=q.nextFollowUp; c.lastContactAt=today(); c.updatedAt=iso()} addActivity('Relance faite',(c?c.name:'Client')+' · '+q.status,q.clientId,q.visitId,q.id); save(); render(); toast('Relance enregistrée')}
function smsText(kind,c,q,v){c=c||{}; q=q||{}; v=v||{}; var sender=smsSender(); var qref=q.quoteNo?(' '+q.quoteNo):''; if(kind==='rdv')return 'Bonjour '+(c.name||'')+', c’est '+sender+'. Je confirme notre rendez-vous pour votre projet '+(v.projectType||c.projectType||'')+' le '+dateLong(v.date,v.time)+'. Merci!'; if(kind==='aftervisit')return 'Bonjour '+(c.name||'')+', merci pour la visite aujourd’hui. Je vais préparer la soumission pour '+(c.projectType||'votre projet')+' et je vous reviens avec les détails.'; if(kind==='quote')return 'Bonjour '+(c.name||'')+', je viens de préparer votre soumission'+qref+' pour '+(q.title||c.projectType||'votre projet')+'. Le total est de '+money(q.total||0)+'. Dites-moi si vous avez des questions.'; if(kind==='followup')return 'Bonjour '+(c.name||'')+', je fais un suivi concernant la soumission'+qref+' pour '+(q.title||c.projectType||'votre projet')+'. Est-ce que le projet est toujours d’actualité?'; if(kind==='won')return 'Bonjour '+(c.name||'')+', merci pour votre confiance. Je confirme que nous avançons avec '+(q.title||c.projectType||'votre projet')+'. Je vous reviens pour les prochaines étapes de planification.'; return 'Bonjour '+(c.name||'')+', c’est '+sender+'. Vous aviez rempli une demande concernant '+(c.projectType||'un projet de rénovation')+'. Est-ce que le projet est toujours d’actualité?'}

function buildQuoteText(q,mode){
  q=q||activeQuote(); mode=mode||'client'; if(!q)return '';
  ensureQuoteMeta(q); calcQuote(q);
  var c=getClient(q.clientId)||{}, v=getVisit(q.visitId)||{};
  var internal=mode==='internal';
  function indentText(s){return String(s||'').replace(/\n/g,'\n   ')}
  var lines=[];
  lines.push((internal?'FICHE INTERNE — ':'SOUMISSION ')+(q.quoteNo||''));
  lines.push(q.title||'Soumission');
  lines.push('');
  lines.push(companyName());
  if(companyPhone())lines.push('Téléphone : '+companyPhone());
  if(companyEmail())lines.push('Courriel : '+companyEmail());
  if(companyAddress())lines.push('Adresse : '+companyAddress());
  if(companyRbq())lines.push('RBQ : '+companyRbq());
  lines.push('');
  lines.push('Client : '+(c.name||''));
  if(c.phone)lines.push('Téléphone : '+c.phone);
  if(c.email)lines.push('Courriel : '+c.email);
  if(c.address)lines.push('Adresse : '+c.address);
  if(v.date)lines.push('Visite : '+dateLong(v.date,v.time));
  if(q.estimatedDuration)lines.push('Durée estimée des travaux : '+q.estimatedDuration);
  lines.push('Date : '+new Date((q.createdAt||iso()).slice(0,10)+'T12:00:00').toLocaleDateString('fr-CA',{day:'numeric',month:'long',year:'numeric'}));
  lines.push('Valide jusqu’au : '+validUntil(q));
  if(internal)lines.push('Statut : '+(q.status||'Brouillon'));
  addBlock(lines,'MESSAGE',q.clientIntro);
  addBlock(lines,'TRAVAUX INCLUS',q.inclusions);
  lines.push('');
  lines.push(internal?'DÉTAIL DES ITEMS':'DÉTAIL DES TRAVAUX');
  (q.items||[]).forEach(function(it,i){
    var d=itemDescForMode(it,internal?'internal':'client');
    lines.push((i+1)+'. '+(it.title||'Item')+' — '+money(it.amount));
    if(d)lines.push('   '+indentText(d));
    if(internal&&it.note)lines.push('   Note interne : '+indentText(it.note));
  });
  addBlock(lines,'EXCLUSIONS',q.exclusions);
  lines.push('');
  lines.push('Sous-total des items : '+money(q.itemsSubtotal||q.subtotal));
  if(q.discount)lines.push('Remise : - '+money(q.discount));
  lines.push('Sous-total : '+money(q.subtotal));
  if(q.taxable!==false){lines.push('TPS : '+money(q.gst)); lines.push('TVQ : '+money(q.qst));}
  lines.push('TOTAL : '+money(q.total));
  if(q.depositPct){lines.push('Acompte '+q.depositPct+' % : '+money(q.deposit)); lines.push('Solde : '+money(q.balance));}
  addBlock(lines,'CONDITIONS DE PAIEMENT',q.paymentTerms);
  addBlock(lines,'CONDITIONS',q.terms);
  if(internal){
    addBlock(lines,'NOTES INTERNES',q.internalNotes);
    addBlock(lines,'NOTES DE VISITE',v.siteNotes||v.preNotes);
    if(c.source)lines.push('\nSource du lead : '+c.source);
    if(c.status)lines.push('Pipeline : '+c.status);
  }
  return lines.join('\n');
}

function matCost(d,baseQty,unitLabel,defaultRate,defaultMarkup){var mode=d.matMode||'aucun', raw=0, desc=''; var markup=n(d.matMarkup||defaultMarkup||0); if(mode==='pi'||mode==='pi2'||mode==='unit'){var rate=n(d.matUnit||defaultRate||0); raw=baseQty*rate; desc='Matériaux : '+baseQty+' '+unitLabel+' × '+moneyPlain(rate)+'/'+unitLabel+' = '+moneyPlain(raw)} else if(mode==='pieces'){var q=n(d.matQty), p=n(d.matPrice||defaultRate||0); raw=q*p; desc='Matériaux : '+q+' unité(s) × '+moneyPlain(p)+' = '+moneyPlain(raw)} else if(mode==='fixed'){raw=n(d.matFixed); desc='Matériaux : montant fixe '+moneyPlain(raw)} if(!raw)return {amount:0,desc:''}; var amt=raw*(1+markup/100); return {amount:amt,desc:desc+(markup?' + markup '+markup+' % = '+moneyPlain(amt):'')};}
function consumableCost(d,base){var mode=d.consMode||'aucun'; if(mode==='fixed'){var f=n(d.consFixed); return {amount:f,desc:f?'Consommables : montant fixe '+moneyPlain(f):''}} if(mode==='pct'){var pct=n(d.consPct); var a=base*pct/100; return {amount:a,desc:pct?pctLine('Consommables',base,pct,a):''}} return {amount:0,desc:''}}
function materialControls(p,unitLabel,defaultRate,markup){return '<div class="field"><label>Matériaux</label><select name="matMode"><option value="aucun">Non inclus</option><option value="pi" '+(p.matMode==='pi'?'selected':'')+'>Prix par '+unitLabel+'</option><option value="pieces" '+(p.matMode==='pieces'?'selected':'')+'>Quantité × prix unitaire</option><option value="fixed" '+(p.matMode==='fixed'?'selected':'')+'>Montant fixe</option></select><div class="calc-note">Les champs matériaux apparaissent seulement si un mode est choisi.</div></div><div class="mat-panel" data-show="matMode:pi">'+formRow(field('Matériel $/'+unitLabel,'matUnit',p.matUnit||defaultRate,'number','step="0.01"'),field('Markup matériaux %','matMarkup',p.matMarkup||markup||20,'number','step="1"'))+'</div><div class="mat-panel" data-show="matMode:pieces">'+formRow(field('Quantité matériaux','matQty',p.matQty||0,'number','step="1"'),field('Prix/unité','matPrice',p.matPrice||defaultRate||0,'number','step="0.01"'))+field('Markup matériaux %','matMarkup',p.matMarkup||markup||20,'number','step="1"')+'</div><div class="mat-panel" data-show="matMode:fixed">'+formRow(field('Montant matériaux fixe','matFixed',p.matFixed||0,'number','step="0.01"'),field('Markup matériaux %','matMarkup',p.matMarkup||markup||20,'number','step="1"'))+'</div>'}
function consumableControls(p){return '<div class="field"><label>Consommables</label><select name="consMode"><option value="aucun">Non inclus</option><option value="fixed" '+(p.consMode==='fixed'?'selected':'')+'>Montant fixe</option><option value="pct" '+(p.consMode==='pct'?'selected':'')+'>Pourcentage du travail</option></select><div class="calc-note">Ex. colle, vis, lames, ruban, rouleaux, protection, calfeutrant additionnel.</div></div><div class="mat-panel" data-show="consMode:fixed">'+field('Montant consommables','consFixed',p.consFixed||0,'number','step="0.01"')+'</div><div class="mat-panel" data-show="consMode:pct">'+field('Consommables %','consPct',p.consPct||0,'number','step="1"')+'</div>'}
function updateConditionalPanels(form){Array.prototype.forEach.call(form.querySelectorAll('[data-show]'),function(panel){var rule=panel.getAttribute('data-show')||'', parts=rule.split(':'), name=parts[0], val=parts[1], el=form.elements[name]; var cur=el?(el.type==='checkbox'?(el.checked?'checked':'unchecked'):el.value):''; panel.classList.toggle('hidden',cur!==val)})}
function bindPreview(formId,previewId,calc,saveFn,itemId){var form=$('#'+formId),prev=$('#'+previewId); function upd(){updateConditionalPanels(form); var it=calc(form); prev.textContent='Total : '+money(it.amount)+' — '+it.title+'\n'+(it.desc||'')} $$('#'+formId+' input,#'+formId+' select,#'+formId+' textarea').forEach(function(x){x.addEventListener('input',upd); x.addEventListener('change',upd)}); $('#cancelSheet').onclick=closeSheet; form.onsubmit=function(e){e.preventDefault(); addOrUpdateItem(saveFn(form),itemId)}; upd()}
function clientCard(c,small){var visits=state.visits.filter(function(v){return v.clientId===c.id}); var quotes=state.quotes.filter(function(q){return q.clientId===c.id}); quotes.forEach(calcQuote); var last=visits[0]; var total=sumClientQuotes(c.id); var lastAct=latestActivityForClient(c.id); var cold=['Nouveau lead','À contacter','Contacté'].indexOf(c.status)>-1 && daysSince(c.lastContactAt||c.updatedAt||c.createdAt)>7; var sentStale=quotes.some(function(q){return ['Envoyée','Relance 1','Relance 2','Soumission envoyée'].indexOf(q.status)>-1 && (isDue(q.nextFollowUp)||daysSince(q.sentAt)>=3)}); var initials=(c.name||'?').split(/\s+/).map(function(x){return x[0]}).join('').slice(0,2).toUpperCase(); var flags=(cold?'<span class="pill cold-flag">Lead froid</span>':'')+(sentStale?'<span class="pill warm-flag">À relancer</span>':''); var actions= small?'': smartActionHtml(c)+'<div class="actions"><a class="mini blue" href="tel:'+esc(digits(c.phone)||c.phone)+'">Appeler</a><a class="mini" href="sms:'+esc(digits(c.phone)||c.phone)+'">Texto</a><button class="mini" data-action="sms-template" data-kind="first" data-client="'+esc(c.id)+'">Message</button><button class="mini primary" data-action="open-client" data-id="'+esc(c.id)+'">Dossier</button><button class="mini purple" data-action="new-quote" data-client="'+esc(c.id)+'">Soumission</button></div>'; return '<article class="card client-card-premium" data-action="open-client" data-id="'+esc(c.id)+'"><div class="client-shell"><div class="client-mainline"><div class="avatar">'+esc(initials)+'</div><div class="main"><div class="client-title-row"><div class="client-name">'+esc(c.name)+'</div><span class="pill '+statusClass(c.status)+'">'+esc(c.status||'Nouveau lead')+'</span>'+flags+'</div><div class="project-line">'+esc(c.projectType||'Projet à préciser')+' · '+esc(c.city||c.address||'Adresse à préciser')+'</div><div class="meta"><div class="meta-line">☎️ <span>'+esc(c.phone||'Téléphone manquant')+'</span></div><div class="meta-line">📣 <span>'+esc(c.source||'Source à préciser')+'</span></div></div></div></div>'+workflowStepsHtml(c)+'<div class="client-metrics"><div class="client-metric"><label>Soumissions</label><strong>'+quotes.length+' · '+money(total)+'</strong></div><div class="client-metric"><label>Dernière action</label><strong>'+esc(lastAct?lastAct.type:(last?'RDV '+dateLong(last.date,last.time):'Aucune'))+'</strong></div></div>'+actions+'</div></article>'}
function calcMoulure(d){var type=d.type||'simple', pi=n(d.pi), diff=n(d.diff), calf=!!d.calf; var rate= type==='moyenne'?TARIFS.moulure.moyenne:(type==='complexe'?TARIFS.moulure.complexe:TARIFS.moulure.simple); var base=pi*rate, mo=base*(1+diff/100); var lines=[unitLine('M.O.',pi,'pi lin.',rate,base)+(diff?' + difficulté '+diff+' % = '+moneyPlain(mo):'')]; var calfAmt=calf?pi*TARIFS.moulure.calf:0; if(calf)lines.push(unitLine('Calfeutrage',pi,'pi lin.',TARIFS.moulure.calf,calfAmt)); var mat=matCost(d,pi,'pi lin.',TARIFS.moulure.matPi,TARIFS.moulure.marge); if(mat.amount)lines.push(mat.desc); var cons=consumableCost(d,mo+calfAmt+mat.amount); if(cons.amount)lines.push(cons.desc); var amt=mo+calfAmt+mat.amount+cons.amount; return {type:'moulure',title:'Moulures / cimaises — '+type,desc:lineJoin(lines)+(d.note?'\nNote : '+d.note:''),amount:amt,params:d}}

function calcCaisson(d){var qty=n(d.qty||1), comp=d.complexity||'simple', diff=n(d.diff), calf=!!d.calf; var rate=comp==='simple'?TARIFS.caisson.simple:(comp==='complexe'?TARIFS.caisson.complexe:TARIFS.caisson.escalier); var base=qty*rate, mo=base*(1+diff/100); var lines=[unitLine('M.O.',qty,'caisson',rate,base)+(diff?' + difficulté '+diff+' % = '+moneyPlain(mo):'')]; var calfUnit=comp==='simple'?TARIFS.caisson.calfSimple:(comp==='complexe'?TARIFS.caisson.calfComplexe:TARIFS.caisson.calfEscalier); var calfAmt=calf?qty*calfUnit:0; if(calf)lines.push(unitLine('Calfeutrage/finition',qty,'caisson',calfUnit,calfAmt)); var mat=matCost(d,qty,'caisson',0,TARIFS.caisson.marge); if(mat.amount)lines.push(mat.desc); var cons=consumableCost(d,mo+calfAmt+mat.amount); if(cons.amount)lines.push(cons.desc); var amt=mo+calfAmt+mat.amount+cons.amount; return {type:'caisson',title:'Caissons muraux — '+comp,desc:lineJoin(lines)+(d.note?'\nNote : '+d.note:''),amount:amt,params:d}}

function calcSimpleType(d,type){var amt=0,title='',desc='',lines=[]; if(type==='plinthe'){var pi=n(d.pi),diff=n(d.diff); var base=pi*TARIFS.plinthe.posePi, mo=base*(1+diff/100); lines.push(unitLine('M.O.',pi,'pi lin.',TARIFS.plinthe.posePi,base)+(diff?' + difficulté '+diff+' % = '+moneyPlain(mo):'')); var calf=d.calf?pi*TARIFS.plinthe.calf:0; if(d.calf)lines.push(unitLine('Calfeutrage',pi,'pi lin.',TARIFS.plinthe.calf,calf)); var mat=matCost(d,pi,'pi lin.',TARIFS.plinthe.matPi,TARIFS.plinthe.marge); if(mat.amount)lines.push(mat.desc); var cons=consumableCost(d,mo+calf+mat.amount); if(cons.amount)lines.push(cons.desc); amt=mo+calf+mat.amount+cons.amount; title='Plinthes';}
 if(type==='cadrage'){var q=n(d.qty),sides=n(d.sides||3),rate=sides>=4?TARIFS.cadrage.ouverture4:TARIFS.cadrage.ouverture3; var mo=q*rate; lines.push(unitLine('M.O.',q,'ouverture',rate,mo)+' ('+sides+' côtés)'); var calf=d.calf?q*TARIFS.cadrage.calf:0; if(d.calf)lines.push(unitLine('Calfeutrage',q,'ouverture',TARIFS.cadrage.calf,calf)); var mat=matCost(d,q,'ouverture',TARIFS.cadrage.matBaguette,TARIFS.cadrage.marge); if(mat.amount)lines.push(mat.desc); var cons=consumableCost(d,mo+calf+mat.amount); if(cons.amount)lines.push(cons.desc); amt=mo+calf+mat.amount+cons.amount; title='Cadrages';}
 if(type==='porte'){var q2=n(d.qty),rate2=d.kind==='exterieure'?TARIFS.porte.exterieure:TARIFS.porte.interieure; var mo2=q2*rate2; lines.push(unitLine('M.O.',q2,'porte',rate2,mo2)); var ret=d.retrait?q2*TARIFS.porte.retrait:0; if(d.retrait)lines.push(unitLine('Retrait ancienne porte',q2,'porte',TARIFS.porte.retrait,ret)); var aj=d.ajust?q2*TARIFS.porte.ajust:0; if(d.ajust)lines.push(unitLine('Ajustement cadre',q2,'porte',TARIFS.porte.ajust,aj)); var mat=matCost(d,q2,'porte',0,20); if(mat.amount)lines.push(mat.desc); var cons=consumableCost(d,mo2+ret+aj+mat.amount); if(cons.amount)lines.push(cons.desc); amt=mo2+ret+aj+mat.amount+cons.amount; title='Portes';}
 if(type==='plancher'){var pi2=n(d.pi2),kind=d.kind||'flottant',rate3=TARIFS.plancher[kind]||TARIFS.plancher.flottant; var mo3=pi2*rate3; lines.push(unitLine('Pose '+kind,pi2,'pi²',rate3,mo3)); var ret3=d.retrait?pi2*TARIFS.plancher.retrait:0; if(d.retrait)lines.push(unitLine('Retrait ancien plancher',pi2,'pi²',TARIFS.plancher.retrait,ret3)); var mem=d.membrane?pi2*TARIFS.plancher.membrane:0; if(d.membrane)lines.push(unitLine('Membrane',pi2,'pi²',TARIFS.plancher.membrane,mem)); var mat=matCost(d,pi2,'pi²',0,20); if(mat.amount)lines.push(mat.desc); var cons=consumableCost(d,mo3+ret3+mem+mat.amount); if(cons.amount)lines.push(cons.desc); amt=mo3+ret3+mem+mat.amount+cons.amount; title='Plancher';}
 if(type==='peinture'){var area=n(d.area),ceil=n(d.ceil),doors=n(d.doors); var murs=area*TARIFS.peinture.murPi2, plafond=ceil*TARIFS.peinture.plafondPi2, portes=doors*TARIFS.peinture.porte; lines.push(unitLine('Murs',area,'pi²',TARIFS.peinture.murPi2,murs)); if(ceil)lines.push(unitLine('Plafond',ceil,'pi²',TARIFS.peinture.plafondPi2,plafond)); if(doors)lines.push(unitLine('Portes',doors,'porte',TARIFS.peinture.porte,portes)); var mat=matCost(d,area+ceil,'pi²',0,20); if(mat.amount)lines.push(mat.desc); var cons=consumableCost(d,murs+plafond+portes+mat.amount); if(cons.amount)lines.push(cons.desc); amt=murs+plafond+portes+mat.amount+cons.amount; title='Peinture';}
 if(type==='heures'){amt=n(d.hours)*n(d.rate||TARIFS.heure.taux); title='Heures / extra'; lines.push(unitLine('Temps',n(d.hours),'h',n(d.rate||TARIFS.heure.taux),amt));}
 if(type==='mobilisation'){amt=n(d.amount||TARIFS.mobilisation.base); title='Mobilisation / minimum chantier'; lines.push('Forfait : '+moneyPlain(amt));}
 if(type==='custom'){amt=n(d.amount); title=d.title||'Item manuel'; lines.push(d.desc||'Montant manuel : '+moneyPlain(amt));}
 desc=lineJoin(lines)+(d.note?'\nNote : '+d.note:''); return {type:type,title:title,desc:desc,amount:amt,params:d}}
