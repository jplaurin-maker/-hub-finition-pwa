var DEFAULT_TARIFS={taxes:{gst:5,qst:9.975},identity:{contractorName:'Jean-Philippe',company:'Laurin Résidentiel',phone:'',email:'',address:'',rbq:'',logoData:''},quote:{prefix:'LR',validDays:15,terms:'Prix valide 15 jours. Travaux selon conditions visibles lors de la visite. Matériaux, corrections majeures, démolition ou imprévus non mentionnés exclus sauf indication contraire.',exclusions:'Permis, corrections de structure, peinture ou matériaux non listés, travaux hors portée initiale.'},portal:{acceptanceEmail:'',supabaseUrl:'',supabaseAnonKey:'',supabaseTable:'quote_acceptances',emailjsPublicKey:'',emailjsServiceId:'',emailjsTemplateId:''},moulure:{simple:4.5,moyenne:6.5,complexe:8.5,calf:0.35,matPi:2.2,marge:20},caisson:{simple:175,complexe:225,escalier:225,calfSimple:20,calfComplexe:30,calfEscalier:30,marge:20},plinthe:{posePi:2.25,calf:0.35,matPi:1.65,marge:20},cadrage:{ouverture3:95,ouverture4:125,calf:12,matBaguette:12,marge:20},porte:{interieure:185,exterieure:325,retrait:35,ajust:45,peintureNormale:65,peintureFrancaise:95,peintureGardeRobe:75},plancher:{flottant:2.75,vinyle:3.25,bois:4.5,retrait:1.25,membrane:0.85,matPi2:8,marge:20},peinture:{murPi2:1.15,plafondPi2:1.35,porte:65,plinthePi:1.10,cadragePi:1.25,primerPi2:0.45,calfPi:0.45,couleurSetup:45,paintGal:55,primerGal:40,coverage:380,primerCoverage:350,high10Pct:12,high12Pct:22,stairPct:35,cutPct:25},heure:{taux:75},mobilisation:{base:185,minimum:450}};

function $(s,r){return(r||document).querySelector(s)}function $$(s,r){return Array.prototype.slice.call((r||document).querySelectorAll(s))}function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}function uid(){return'id_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8)}function iso(){return new Date().toISOString()}function today(){return iso().slice(0,10)}function n(v){var x=parseFloat(String(v==null?'':v).replace(',','.'));return isNaN(x)?0:x}function clean(v){return String(v==null?'':v).trim()}function clone(o){return JSON.parse(JSON.stringify(o||{}))}function deepMerge(a,b){a=a||{};b=b||{};Object.keys(b).forEach(function(k){if(b[k]&&typeof b[k]==='object'&&!Array.isArray(b[k]))a[k]=deepMerge(a[k]||{},b[k]);else if(b[k]!==undefined&&b[k]!==null)a[k]=b[k]});return a}function pathGet(o,p){return String(p).split('.').reduce(function(a,k){return a&&a[k]!=null?a[k]:''},o)}function pathSet(o,p,v){var ar=p.split('.'),cur=o;ar.slice(0,-1).forEach(function(k){cur[k]=cur[k]||{};cur=cur[k]});cur[ar[ar.length-1]]=v}function loadTarifs(){try{return deepMerge(clone(DEFAULT_TARIFS),JSON.parse(localStorage.getItem(TARIFS_KEY)||'{}'))}catch(e){return clone(DEFAULT_TARIFS)}}function saveTarifs(){localStorage.setItem(TARIFS_KEY,JSON.stringify(TARIFS))}function money(x){return new Intl.NumberFormat('fr-CA',{style:'currency',currency:'CAD'}).format(n(x))}function fmt(x,d){return (Math.round(n(x)*Math.pow(10,d||2))/Math.pow(10,d||2)).toLocaleString('fr-CA')}function digits(v){return clean(v).replace(/\D/g,'')}function phone(v){var d=digits(v);return d.length===10?'('+d.slice(0,3)+') '+d.slice(3,6)+'-'+d.slice(6):clean(v)}function shortDate(d){if(!d)return '';try{return new Date(d+'T12:00:00').toLocaleDateString('fr-CA',{day:'numeric',month:'short',year:'numeric'})}catch(e){return d}}function addDays(d,days){var x=new Date((d||today())+'T12:00:00');x.setDate(x.getDate()+Number(days||0));return x.toISOString().slice(0,10)}function titleCase(s){return String(s||'').replace(/\b\w/g,function(c){return c.toUpperCase()})}

function save(){localStorage.setItem(KEY,JSON.stringify(state))}function load(){var raw=localStorage.getItem(KEY)||localStorage.getItem(OLD_KEY);if(raw){try{state=deepMerge(state,JSON.parse(raw))}catch(e){}} migrateState(); save()}
function migrateState(){state.clients=Array.isArray(state.clients)?state.clients:[];state.visits=Array.isArray(state.visits)?state.visits:[];state.quotes=Array.isArray(state.quotes)?state.quotes:[];state.activities=Array.isArray(state.activities)?state.activities:[];state.clients.forEach(function(c){c.id=c.id||uid();c.name=c.name||c.clientName||'Client sans nom';c.status=c.status||'Nouveau lead';c.createdAt=c.createdAt||iso();c.updatedAt=c.updatedAt||c.createdAt});state.quotes.forEach(function(q){q.id=q.id||uid();q.items=Array.isArray(q.items)?q.items:[];q.createdAt=q.createdAt||iso();q.updatedAt=q.updatedAt||q.createdAt;q.status=q.status||'Brouillon';q.quoteNo=q.quoteNo||nextQuoteNo(true);q.taxable=q.taxable!==false;q.validDays=q.validDays||TARIFS.quote.validDays||15;q.terms=q.terms||TARIFS.quote.terms;q.exclusions=q.exclusions||TARIFS.quote.exclusions;q.items=q.items.map(normalizeItem);calcQuote(q)});state.activeTab=state.activeTab||'prospects'}
function normalizeItem(it){if(Array.isArray(it))it={title:it[0],desc:it[1],total:it[2]};it=it||{};it.id=it.id||uid();it.type=it.type||guessType(it.title);it.title=it.title||typeTitle(it.type);it.desc=it.desc||it.description||'';it.clientDesc=it.clientDesc||clientDescFrom(it);it.internalDesc=it.internalDesc||it.desc;it.total=n(it.total);it.data=it.data||{};return it}function guessType(t){t=String(t||'').toLowerCase();if(t.includes('caisson'))return'caisson';if(t.includes('peinture'))return'peinture';if(t.includes('plancher'))return'plancher';if(t.includes('porte'))return'porte';if(t.includes('plinthe'))return'plinthe';if(t.includes('cadrage'))return'cadrage';if(t.includes('moulure')||t.includes('cimaise'))return'moulure';return'manuel'}function typeTitle(type){return{moulure:'Moulures / cimaises',caisson:'Caissons muraux',plinthe:'Plinthes',cadrage:'Cadrages',porte:'Portes',plancher:'Plancher',peinture:'Peinture intérieure',heure:'Heures / extras',manuel:'Item manuel'}[type]||'Item'}function clientDescFrom(it){var t=guessType(it.title),d=it.desc||''; if(t==='peinture')return'Peinture intérieure selon les pièces et surfaces sélectionnées.'; if(t==='caisson')return'Fabrication et installation de caissons muraux selon la portée convenue.'; if(t==='moulure')return'Installation de moulures/cimaises selon la portée convenue.'; if(t==='plancher')return'Travaux de plancher selon la surface et les options convenues.'; if(t==='porte')return'Installation et ajustement de porte(s) selon la portée convenue.'; return d.split('\n')[0]||'Travaux selon la portée convenue.'}
function quotePrefix(){return (clean(pathGet(TARIFS,'quote.prefix'))||'LR').toUpperCase()}function nextQuoteNo(peek){var y=String(new Date().getFullYear());state.quoteCounters=state.quoteCounters||{};var max=0;(state.quotes||[]).forEach(function(q){var m=String(q.quoteNo||'').match(new RegExp('-'+y+'-(\\d+)$'));if(m)max=Math.max(max,+m[1])});var v=Math.max(max,state.quoteCounters[y]||0)+(peek?1:1);if(!peek)state.quoteCounters[y]=v;return quotePrefix()+'-'+y+'-'+String(v).padStart(3,'0')}
function getClient(id){return state.clients.find(function(x){return x.id===id})}function getQuote(id){return state.quotes.find(function(x){return x.id===id})}function clientName(id){var c=getClient(id);return c?c.name:'Client'}function activeClient(){return getClient(state.activeClientId)||state.clients[0]||null}function activeQuote(){return getQuote(state.activeQuoteId)||state.quotes[0]||null}
function calcQuote(q){q=q||{};var sub=(q.items||[]).reduce(function(s,it){return s+n(it.total)},0);q.itemsSubtotal=sub;q.discount=n(q.discountAmount)||(sub*n(q.discountPct)/100);q.subtotal=Math.max(0,sub-q.discount);q.gst=q.taxable!==false?q.subtotal*n(TARIFS.taxes.gst)/100:0;q.qst=q.taxable!==false?q.subtotal*n(TARIFS.taxes.qst)/100:0;q.total=q.subtotal+q.gst+q.qst;q.deposit=q.total*n(q.depositPct)/100;q.balance=q.total-q.deposit;return q}
function statusClass(s){if(['Gagné','Acceptée','En cours'].indexOf(s)>-1)return'green';if(['Perdu','Perdue'].indexOf(s)>-1)return'red';if(['Relance 1','Relance 2','RDV confirmé'].indexOf(s)>-1)return'orange';if(['Soumission à préparer','Soumission envoyée'].indexOf(s)>-1)return'purple';return'blue'}function wf(c){var idx={'Nouveau lead':0,'À contacter':0,'Contacté':1,'RDV proposé':1,'RDV confirmé':2,'Visite à faire':2,'Visite faite':3,'Soumission à préparer':4,'Soumission envoyée':4,'Relance 1':5,'Relance 2':5,'En cours':6,'Gagné':6,'Perdu':6}[c.status||'Nouveau lead']||0;return'<div class="work">'+['Lead','Contact','RDV','Visite','Soum.','Relance','Gagné'].map(function(l,i){return'<div class="step '+(i<idx?'done':i===idx?'cur':'')+'"><div class="dot">'+(i<idx?'✓':i+1)+'</div><span>'+l+'</span></div>'}).join('')+'</div>'}

function render(){var p=state.activeTab||'prospects';document.getElementById('app').innerHTML='<div class="wrap"><div class="top"><div><div class="version">Hub Chantier '+VERSION+'</div><div class="h1">'+({prospects:'Prospects',pipeline:'Pipeline',agenda:'Rendez-vous',chantier:'Visite',soumission:'Soumissions'}[p]||'Hub')+'</div><div class="sub">'+({prospects:'CRM, historique et soumissions',pipeline:'Suivi du cheminement',agenda:'Visites et calendrier',chantier:'Photos, mesures et notes',soumission:'Calculs, PDF et historique client'}[p]||'')+'</div></div><div><button class="round" data-action="theme">◐</button><button class="round" data-action="settings">•••</button></div></div>'+renderPage(p)+'</div><button class="round" style="position:fixed;right:32px;bottom:148px;background:#1976ff;color:#fff;font-size:46px;z-index:60" data-action="quick-add">+</button>'+bottomNav(p);bindActions()}

        if(a==='edit-client')return newClient(b.dataset.id);
        if(a==='new-quote')return newQuote(b.dataset.client);
        if(a==='open-quote')return openQuote(b.dataset.id);
        if(a==='add-item')return addItemSheet(b.dataset.quote);
        if(a==='open-calc')return openCalc(b.dataset.type,b.dataset.quote);
        if(a==='edit-item'){
          var q=activeQuote();var it=(q.items||[]).find(function(x){return x.id===b.dataset.id});
          if(!it)throw Error('Item introuvable');
          return openCalc((it&&it.type)||guessType(it&&it.title),q.id,b.dataset.id);
        }
        if(a==='delete-item'){
          var qd=activeQuote();qd.items=(qd.items||[]).filter(function(x){return x.id!==b.dataset.id});calcQuote(qd);save();openQuote(qd.id);return;
        }
        if(a==='item-detail'){
          var qi=activeQuote();var iti=(qi.items||[]).find(function(x){return x.id===b.dataset.id});
          return openSheet('Détail item','<pre style="white-space:pre-wrap">'+esc((iti&&iti.internalDesc)||'')+'</pre>');
        }
        if(a==='portal-link')return openPortal(b.dataset.id);
        if(a==='pdf-client')return pdfClient(b.dataset.id);
        if(a==='internal-view')return internalView(b.dataset.id);
        if(a==='settings')return settings();
        if(a==='save-tarifs'){$$('[data-t]').forEach(function(el){pathSet(TARIFS,el.dataset.t,el.value)});saveTarifs();closeSheet();toast('Tarifs sauvegardés');return;}
        if(a==='tarif-section')return showTarifSection(b.dataset.sec);
        if(a==='export-json')return exportJson();
        if(a==='import-json')return importJson();
        if(a==='repair-data')return repairData();
        if(a==='show-prospects'){state.activeTab='prospects';render();return;}
        if(a==='show-followups'||a==='show-quotes-prep'){state.activeTab='soumission';render();return;}
        if(a==='paint-add-room'){window._paintData.rooms.push(defaultRoom());return renderPaintRooms();}
        if(a==='paint-del-room'){window._paintData.rooms.splice(+b.dataset.ri,1);return renderPaintRooms();}
        if(a==='paint-add-wall'){window._paintData.rooms[+b.dataset.ri].walls.push({name:'Mur '+(window._paintData.rooms[+b.dataset.ri].walls.length+1),width:10,color:'Blanc',kind:'normal',windows:[],openings:[]});return renderPaintRooms();}
        if(a==='paint-del-wall'){window._paintData.rooms[+b.dataset.ri].walls.splice(+b.dataset.wi,1);return renderPaintRooms();}
        if(a==='paint-add-window'){window._paintData.rooms[+b.dataset.ri].walls[+b.dataset.wi].windows.push({w:36,h:48});return renderPaintRooms();}
        if(a==='paint-add-opening'){window._paintData.rooms[+b.dataset.ri].walls[+b.dataset.wi].openings.push({type:'normal',w:30,h:80});return renderPaintRooms();}
        if(a==='paint-add-door'){window._paintData.rooms[+b.dataset.ri].paintDoors.push({type:'normal',faces:2,color:'Blanc'});return renderPaintRooms();}
        if(a==='paint-del-door'){window._paintData.rooms[+b.dataset.ri].paintDoors.splice(+b.dataset.di,1);return renderPaintRooms();}
      }catch(err){console.error(err);openSheet('Erreur action','<div class="danger">Action impossible : '+esc(err.message||err)+'</div>')}
    };
  });
  $$('[data-copy]',root).forEach(function(b){b.onclick=function(){navigator.clipboard&&navigator.clipboard.writeText(b.dataset.copy);toast('Copié')}});
}
window.addEventListener('error',function(e){console.error(e.error||e.message);toast('Erreur interceptée : données conservées')});load();render();
</script></body></html>
